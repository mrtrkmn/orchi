name: Test

on:
  push:
    branches:
      - master
      - develop
      - 'hotfix/**'
      - 'feature/**'
  pull_request:
    branches:
      - master
      - develop
      - 'hotfix/**'
      - 'feature/**'

jobs:

  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test
        run: go test -race -coverprofile=coverage.txt -covermode=atomic -v ./...
