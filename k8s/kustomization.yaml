# ==============================================================================
# Kustomize Base — k8s/kustomization.yaml
# ==============================================================================
# Kustomize base configuration for the orchi platform.
# Use overlays (dev, staging, prod) to customize per environment.
#
# Legacy mapping:
#   daemon.NewConfigFromFile(path)     → Kustomize overlays per environment
#   Single config.yml with all settings → Separated base + overlay patches
#   Manual kubectl apply               → kustomize build | kubectl apply
#
# Usage:
#   # Apply base (for review/testing):
#   kubectl apply -k k8s/
#
#   # Apply with overlay:
#   kubectl apply -k k8s/overlays/dev
#   kubectl apply -k k8s/overlays/staging
#   kubectl apply -k k8s/overlays/prod
# ==============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base
