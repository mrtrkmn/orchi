# ==============================================================================
# Kustomize Root — k8s/kustomization.yaml
# ==============================================================================
# Root entry point that delegates to the base configuration.
# For environment-specific deployments, use overlays instead:
#
# Usage:
#   # Apply base (for review/testing):
#   kubectl apply -k k8s/
#
#   # Apply with overlay:
#   kubectl apply -k k8s/overlays/dev
#   kubectl apply -k k8s/overlays/staging
#   kubectl apply -k k8s/overlays/prod
# ==============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base
