# ==============================================================================
# Operator Access NetworkPolicy
# ==============================================================================
# Allows the orchi-operator in orchi-system to manage pods in lab namespaces
# (health checks, log streaming, exec for debugging).
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-operator-access
  namespace: orchi-lab-example
  labels:
    app.kubernetes.io/managed-by: orchi-operator
    app.kubernetes.io/part-of: orchi
    orchi.cicibogaz.com/component: network-policy
    orchi.cicibogaz.com/lab-id: "example"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Allow from orchi-operator
    - from:
        - namespaceSelector:
            matchLabels:
              orchi.cicibogaz.com/component: system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: orchi-operator
