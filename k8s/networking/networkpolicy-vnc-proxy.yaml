# ==============================================================================
# VNC Proxy Access NetworkPolicy
# ==============================================================================
# Allows the VNC proxy in orchi-system to reach KubeVirt VM VNC endpoints
# (port 5900) in lab namespaces. Replaces networkpolicy-guacamole-access.yaml.
#
# Replaces:
#   guacamole.CreateRDPConn() → VNC proxy connects directly to KubeVirt VNC
#   networkpolicy-guacamole-access.yaml → This policy (VNC instead of RDP)
#
# Key differences from Guacamole policy:
#   - Port 5900 (VNC) instead of 3389 (RDP)
#   - Selects orchi-vnc-proxy pods instead of guacamole pods
#   - Same namespace isolation model
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vnc-proxy-access
  namespace: orchi-lab-example
  labels:
    app.kubernetes.io/managed-by: orchi-operator
    app.kubernetes.io/part-of: orchi
    orchi.cyberorch.com/component: network-policy
    orchi.cyberorch.com/lab-id: "example"
# Note: podSelector targets pods labeled as 'frontend' — in the Orchi lab model,
# 'frontend' refers to the VM instances that provide the desktop environment
# (Kali, Ubuntu, Parrot) with VNC access, not the web frontend.
# This label is applied by the orchi-operator when creating lab VMs.
spec:
  podSelector:
    matchLabels:
      orchi.cyberorch.com/component: frontend
  policyTypes:
    - Ingress
  ingress:
    # Allow VNC from the VNC proxy in orchi-system
    - from:
        - namespaceSelector:
            matchLabels:
              orchi.cyberorch.com/component: system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: orchi-vnc-proxy
      ports:
        - port: 5900
          protocol: TCP
