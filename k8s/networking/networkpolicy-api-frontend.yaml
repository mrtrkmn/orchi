# NetworkPolicy: API Gateway Access
#
# The API Gateway is the only entry point for external traffic into the
# orchi-system namespace. It receives traffic from the Ingress controller
# and communicates with internal services (Store, Daemon) via gRPC.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: networkpolicy-api-gateway
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-api-gateway
    app.kubernetes.io/part-of: orchi
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orchi-api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: orchi-ingress
      ports:
        - protocol: TCP
          port: 8080
    # Allow Prometheus to scrape metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: orchi-monitoring
      ports:
        - protocol: TCP
          port: 8081
  egress:
    # Allow gRPC to Store service
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: orchi-store
      ports:
        - protocol: TCP
          port: 5454
    # Allow gRPC to Daemon/Operator
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: orchi-operator
      ports:
        - protocol: TCP
          port: 5454
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# NetworkPolicy: Frontend Access
#
# The frontend pods only serve static files.
# They accept traffic from the Ingress controller and make no outbound connections.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: networkpolicy-frontend
  namespace: orchi-frontend
  labels:
    app.kubernetes.io/name: orchi-frontend
    app.kubernetes.io/part-of: orchi
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orchi-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Ingress controller only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: orchi-ingress
      ports:
        - protocol: TCP
          port: 80
  egress: []
  # No egress allowed — static file server has no outbound needs
