# ==============================================================================
# Lab CoreDNS ConfigMap
# ==============================================================================
# Replaces the legacy Docker-based CoreDNS container (network/dns/dns.go).
# Instead of spawning a CoreDNS Docker container per lab, DNS records are
# added to the cluster CoreDNS via a ConfigMap that the operator manages.
#
# Legacy mapping:
#   dns.New(records)       → This ConfigMap (zonefile content)
#   dns.Server.Run()       → Cluster CoreDNS reads this ConfigMap
#   dns.Server.Container() → No container; cluster CoreDNS handles it
#   dns.RR{Name,Type,RData}→ Zone file entries in data.zonefile
#   dns.PreferedIP (3)     → Service ClusterIP (auto-assigned)
#
# The orchi-operator updates this ConfigMap when challenges are added/removed.
# CoreDNS is configured (via its Corefile) to watch for ConfigMap changes.
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-dns-records
  namespace: orchi-lab-example
  labels:
    app.kubernetes.io/managed-by: orchi-operator
    app.kubernetes.io/part-of: orchi
    orchi.cicibogaz.com/component: dns
    orchi.cicibogaz.com/lab-id: "example"
data:
  # CoreDNS Corefile for this lab's zone
  Corefile: |
    lab.orchi.local:53 {
        file /etc/coredns/zonefile
        errors
        log
        health :8080
    }
  # Zone file with challenge DNS records
  # Operator populates this from Challenge CRD .spec.dnsRecords
  zonefile: |
    $ORIGIN lab.orchi.local.
    @   3600 IN SOA ns.lab.orchi.local. admin.lab.orchi.local. (
                    2024010100 ; serial
                    7200       ; refresh (2 hours)
                    3600       ; retry (1 hour)
                    1209600    ; expire (2 weeks)
                    3600       ; minimum (1 hour)
                    )
        IN NS ns.lab.orchi.local.
    ; Challenge A records — auto-generated by orchi-operator
    ; Maps to store.RecordConfig entries
    sql-injection   IN A  10.96.0.10
    xss-basic       IN A  10.96.0.11
    web-server      IN A  10.96.0.12
