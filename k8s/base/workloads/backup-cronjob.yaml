# ==============================================================================
# Store Backup CronJob
# ==============================================================================
# Periodic backup of the orchi-store PVC data. Creates compressed snapshots
# and uploads them to object storage (S3-compatible).
#
# Legacy mapping:
#   No legacy backup (data was on filesystem, manual backup)
#   daemon.Config.ConfFiles.EventsDir  → PVC /data backed up here
#   File-based persistence             → Automated CronJob backup
#
# Backup strategy:
#   - Every 6 hours: full backup of /data
#   - Retains 7 days of backups
#   - Uploads to S3-compatible object storage
# ==============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: store-backup
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: store-backup
    app.kubernetes.io/managed-by: orchi-operator
    app.kubernetes.io/part-of: orchi
    orchi.cyberorch.com/component: backup
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: store-backup
            app.kubernetes.io/part-of: orchi
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: amazon/aws-cli:2.15.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="/tmp/orchi-store-backup-${TIMESTAMP}.tar.gz"
                  echo "Starting backup at ${TIMESTAMP}"
                  tar -czf "${BACKUP_FILE}" -C /data .
                  echo "Uploading to S3..."
                  aws s3 cp "${BACKUP_FILE}" \
                    "s3://${BACKUP_BUCKET}/orchi-store/${TIMESTAMP}.tar.gz"
                  echo "Cleaning up backups older than 7 days..."
                  CUTOFF_DATE=$(date -d '7 days ago' +%Y%m%d 2>/dev/null || date -v-7d +%Y%m%d)
                  aws s3 ls "s3://${BACKUP_BUCKET}/orchi-store/" | \
                    awk '{print $4}' | grep -v '^$' | while read -r fname; do
                      FDATE=$(echo "$fname" | grep -o '^[0-9]\{8\}')
                      if [ -n "$FDATE" ] && [ "$FDATE" -lt "$CUTOFF_DATE" ]; then
                        aws s3 rm "s3://${BACKUP_BUCKET}/orchi-store/$fname"
                      fi
                    done
                  echo "Backup completed successfully"
              env:
                - name: BACKUP_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: bucket
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: region
              envFrom:
                - secretRef:
                    name: backup-credentials
                    optional: false
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: data-orchi-store-0
                readOnly: true
            - name: tmp
              emptyDir:
                sizeLimit: 2Gi
---
# ==============================================================================
# Backup ConfigMap
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-config
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: store-backup
    app.kubernetes.io/part-of: orchi
data:
  bucket: "orchi-backups"
  region: "eu-west-1"
---
# ==============================================================================
# Backup Credentials Secret
# ==============================================================================
# WARNING: Example only. Use ExternalSecret in production.
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backup-credentials
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: store-backup
    app.kubernetes.io/part-of: orchi
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_BEFORE_DEPLOY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_BEFORE_DEPLOY"
