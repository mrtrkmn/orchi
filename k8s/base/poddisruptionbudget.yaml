# ==============================================================================
# PodDisruptionBudgets — Critical Services
# ==============================================================================
# Ensures critical orchi services maintain availability during voluntary
# disruptions (node drain, cluster upgrades, rolling deployments).
#
# Legacy mapping:
#   daemon single-instance             → PDB ensures operator stays up during drains
#   guacamole.create() single instance → PDB prevents guacamole eviction during upgrades
#   No legacy HA                       → PDBs enforce minimum availability (new)
# ==============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: orchi-operator-pdb
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-operator
    app.kubernetes.io/part-of: orchi
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchi-operator
