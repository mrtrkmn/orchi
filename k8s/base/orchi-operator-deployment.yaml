# ==============================================================================
# Orchi Operator — Deployment
# ==============================================================================
# The orchi-operator replaces the legacy orchi daemon. It runs as a Kubernetes
# controller that watches Event, Lab, Team, and Challenge CRs and reconciles
# them into the appropriate Kubernetes resources.
#
# Legacy mapping:
#   daemon.New(config)           → Operator startup + leader election
#   daemon.Run()                 → Controller manager Run()
#   daemon.Close()               → Graceful shutdown via SIGTERM
#   daemon job schedulers        → Reconcile loops + RequeueAfter
#   daemon.eventPool             → Event CR watch + Lab CR reconciliation
#   daemon.Config                → ConfigMap + Secret refs
#   daemon gRPC port 5454        → K8s API server (CRD CRUD replaces gRPC)
#   daemon SIGHUP config reload  → ConfigMap watch triggers reconcile
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchi-operator
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-operator
    app.kubernetes.io/managed-by: orchi-operator
    app.kubernetes.io/part-of: orchi
    orchi.cyberorch.com/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchi-operator
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchi-operator
        app.kubernetes.io/managed-by: orchi-operator
        app.kubernetes.io/part-of: orchi
        orchi.cyberorch.com/component: operator
    spec:
      serviceAccountName: orchi-operator
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: ghcr.io/mrtrkmn/orchi/operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: orchi-operator-config
            - secretRef:
                name: orchi-operator-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      terminationGracePeriodSeconds: 30
---
# ==============================================================================
# Operator Secret — sensitive configuration
# ==============================================================================
# Replaces daemon.Config fields that contain credentials.
# WARNING: This is an example only. Do NOT commit real credentials to version
# control. In production, use one of:
#   - External Secrets Operator (e.g., AWS Secrets Manager, HashiCorp Vault)
#   - Sealed Secrets (Bitnami)
#   - kubectl create secret generic orchi-operator-secrets --from-literal=...
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: orchi-operator-secrets
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-operator
    app.kubernetes.io/part-of: orchi
type: Opaque
stringData:
  # Maps to daemon.Config.SigningKey
  ORCHI_SIGNING_KEY: "REPLACE_BEFORE_DEPLOY"
  # Maps to daemon.Config.Rechaptcha
  ORCHI_RECAPTCHA_KEY: "REPLACE_BEFORE_DEPLOY"
  # Maps to daemon.Config.APICreds
  ORCHI_API_USERNAME: "admin"
  ORCHI_API_PASSWORD: "REPLACE_BEFORE_DEPLOY"
