# ==============================================================================
# ExternalSecret — Operator Secrets
# ==============================================================================
# Replaces hardcoded Secret YAMLs with ExternalSecret CRs that pull credentials
# from an external secret manager (AWS Secrets Manager, HashiCorp Vault, etc.).
#
# Legacy mapping:
#   daemon.Config.SigningKey           → ORCHI_SIGNING_KEY from vault
#   daemon.Config.Rechaptcha           → ORCHI_RECAPTCHA_KEY from vault
#   daemon.Config.APICreds             → ORCHI_API_USERNAME / ORCHI_API_PASSWORD from vault
#   daemon.Config.Database.AuthKey     → STORE_AUTH_KEY from vault
#   daemon.Config.Database.SignKey     → STORE_SIGN_KEY from vault
#   wg.WireGuardConfig private key     → WG server private key from vault
#   guacamole MySQL root password      → MYSQL_ROOT_PASSWORD from vault
#
# Prerequisites:
#   - External Secrets Operator installed (https://external-secrets.io)
#   - ClusterSecretStore configured for your backend
# ==============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: orchi-secret-store
  labels:
    app.kubernetes.io/part-of: orchi
spec:
  provider:
    # Example: AWS Secrets Manager — replace with your backend
    # Supported: aws, vault, gcp, azure, etc.
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: orchi-system
---
# ==============================================================================
# ExternalSecret — Operator credentials
# ==============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: orchi-operator-secrets
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-operator
    app.kubernetes.io/part-of: orchi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: orchi-secret-store
    kind: ClusterSecretStore
  target:
    name: orchi-operator-secrets
    creationPolicy: Owner
  data:
    - secretKey: ORCHI_SIGNING_KEY
      remoteRef:
        key: orchi/operator
        property: signing-key
    - secretKey: ORCHI_RECAPTCHA_KEY
      remoteRef:
        key: orchi/operator
        property: recaptcha-key
    - secretKey: ORCHI_API_USERNAME
      remoteRef:
        key: orchi/operator
        property: api-username
    - secretKey: ORCHI_API_PASSWORD
      remoteRef:
        key: orchi/operator
        property: api-password
---
# ==============================================================================
# ExternalSecret — Store database credentials
# ==============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: orchi-store-secrets
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-store
    app.kubernetes.io/part-of: orchi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: orchi-secret-store
    kind: ClusterSecretStore
  target:
    name: orchi-store-secrets
    creationPolicy: Owner
  data:
    - secretKey: STORE_AUTH_KEY
      remoteRef:
        key: orchi/store
        property: auth-key
    - secretKey: STORE_SIGN_KEY
      remoteRef:
        key: orchi/store
        property: sign-key
---
# ==============================================================================
# ExternalSecret — WireGuard server key
# ==============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wireguard-secret
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: wireguard
    app.kubernetes.io/part-of: orchi
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: orchi-secret-store
    kind: ClusterSecretStore
  target:
    name: wireguard-secret
    creationPolicy: Owner
  data:
    - secretKey: server-private-key
      remoteRef:
        key: orchi/wireguard
        property: server-private-key
---
# ==============================================================================
# ExternalSecret — Guacamole MySQL credentials
# ==============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guacamole-db-secret
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: guacamole
    app.kubernetes.io/part-of: orchi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: orchi-secret-store
    kind: ClusterSecretStore
  target:
    name: guacamole-db-secret
    creationPolicy: Owner
  data:
    - secretKey: MYSQL_ROOT_PASSWORD
      remoteRef:
        key: orchi/guacamole
        property: mysql-root-password
    - secretKey: MYSQL_PASSWORD
      remoteRef:
        key: orchi/guacamole
        property: mysql-password
