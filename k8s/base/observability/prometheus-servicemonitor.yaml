# ==============================================================================
# WireGuard ServiceMonitor
# ==============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: wireguard
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: wireguard
    app.kubernetes.io/part-of: orchi
    orchi.cyberorch.com/component: vpn
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: wireguard
  endpoints:
    # WireGuard does not expose a native metrics port.
    # Use a prometheus-wireguard-exporter sidecar to expose metrics.
    - port: wireguard
      path: /metrics
      interval: 60s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - orchi-system
