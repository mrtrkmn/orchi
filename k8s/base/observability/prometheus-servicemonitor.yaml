# ==============================================================================
# Prometheus ServiceMonitors
# ==============================================================================
# ServiceMonitor CRDs tell Prometheus which Services to scrape for metrics.
# Each orchi component exposes a /metrics endpoint that Prometheus scrapes.
#
# Legacy mapping:
#   daemon.MonitorHost() streaming gRPC  → Prometheus node_exporter + custom metrics
#   In-memory CPU/Memory polling          → kube-state-metrics + cAdvisor (built-in)
#   No legacy metrics endpoint            → /metrics on each component (new)
#
# Prerequisites:
#   - prometheus-operator (kube-prometheus-stack) installed in the cluster
#   - ServiceMonitor CRD available
# ==============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: orchi-operator
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-operator
    app.kubernetes.io/part-of: orchi
    orchi.cyberorch.com/component: operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: orchi-operator
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - orchi-system
---
