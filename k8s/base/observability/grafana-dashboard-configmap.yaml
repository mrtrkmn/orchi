# ==============================================================================
# Grafana Dashboard — Orchi Platform Overview
# ==============================================================================
# Auto-provisioned Grafana dashboard via ConfigMap sidecar.
# Requires the Grafana sidecar to watch for ConfigMaps with the label
# grafana_dashboard: "1" (default in kube-prometheus-stack).
#
# Legacy mapping:
#   daemon.MonitorHost() CPU/Memory stream  → Grafana panels (CPU, Memory, Pods)
#   No legacy dashboard                     → Full platform visibility (new)
#
# This dashboard provides:
#   - Operator reconcile rate and error rate
#   - Active events, labs, and teams count
#   - Pod status across lab namespaces
#   - Resource utilization (CPU, memory) for orchi-system
#   - WireGuard VPN peer count and traffic
#   - Guacamole active sessions
#   - Store database health and latency
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchi-grafana-dashboard
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-grafana-dashboard
    app.kubernetes.io/part-of: orchi
    grafana_dashboard: "1"
data:
  orchi-overview.json: |
    {
      "annotations": { "list": [] },
      "description": "Orchi Platform — Kubernetes Migration Overview",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Operator Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "up{job=\"orchi-operator\", namespace=\"orchi-system\"}",
              "legendFormat": "operator"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } }, "type": "value" }
              ],
              "thresholds": { "steps": [{ "value": 0, "color": "red" }, { "value": 1, "color": "green" }] }
            }
          }
        },
        {
          "title": "Active Lab Namespaces",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_namespace_labels{label_orchi_cyberorch_com_component=\"lab\"}) or vector(0)",
              "legendFormat": "namespaces"
            }
          ]
        },
        {
          "title": "Pods in Lab Namespaces",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace=~\"orchi-lab-.*\"}) or vector(0)",
              "legendFormat": "pods"
            }
          ]
        },
        {
          "title": "Workload Status (orchi-system)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "sum(up{namespace=\"orchi-system\"})",
              "legendFormat": "up targets"
            }
          ]
        },
        {
          "title": "Operator Reconcile Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(controller_runtime_reconcile_total{namespace=\"orchi-system\"}[5m])) by (controller)",
              "legendFormat": "{{ controller }}"
            }
          ]
        },
        {
          "title": "Operator Reconcile Errors",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(controller_runtime_reconcile_errors_total{namespace=\"orchi-system\"}[5m])) by (controller)",
              "legendFormat": "{{ controller }} errors"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "red" }
            }
          }
        },
        {
          "title": "CPU Usage — orchi-system",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"orchi-system\", container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          }
        },
        {
          "title": "Memory Usage — orchi-system",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"orchi-system\", container!=\"\"}) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          }
        },
        {
          "title": "Pod Restarts — orchi-system",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"orchi-system\"}[1h])",
              "legendFormat": "{{ pod }}/{{ container }}"
            }
          ]
        },
        {
          "title": "PVC Usage — orchi-system",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [
            {
              "expr": "kubelet_volume_stats_used_bytes{namespace=\"orchi-system\"} / kubelet_volume_stats_capacity_bytes{namespace=\"orchi-system\"}",
              "legendFormat": "{{ persistentvolumeclaim }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "steps": [{ "value": 0, "color": "green" }, { "value": 0.7, "color": "yellow" }, { "value": 0.85, "color": "red" }] },
              "min": 0,
              "max": 1
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["orchi", "kubernetes", "platform"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Orchi Platform Overview",
      "uid": "orchi-platform-overview"
    }
