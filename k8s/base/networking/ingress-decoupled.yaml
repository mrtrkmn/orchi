# Orchi Decoupled Architecture Ingress
#
# Routes traffic to the frontend SPA and API gateway independently.
# TLS termination with cert-manager for automatic certificate management.
# Supports WebSocket upgrade for live scoreboard connections.
#
# Event subdomains:
#   <EVENTNAME>.cyberorch.com → frontend SPA (React Router handles /events/:id)
#   The SPA detects the subdomain and loads the corresponding event context.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orchi-decoupled-ingress
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-ingress
    app.kubernetes.io/part-of: orchi
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # WebSocket support for live scoreboard and VNC
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cyberorch.com
        - "*.cyberorch.com"
      secretName: cyberorch-tls-cert
  rules:
    # Frontend SPA — main domain
    - host: cyberorch.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchi-frontend
                port:
                  number: 80
    # API Gateway — REST API and WebSocket endpoints
    - host: api.cyberorch.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchi-api-gateway
                port:
                  number: 8080
    # VNC Proxy — browser-based remote desktop via noVNC + WebSocket
    - host: desktop.cyberorch.com
      http:
        paths:
          - path: /vnc
            pathType: Prefix
            backend:
              service:
                name: orchi-vnc-proxy
                port:
                  number: 8443
---
# Wildcard Ingress — Event subdomains
#
# Routes *.cyberorch.com to the frontend SPA. The frontend detects the
# subdomain (e.g., "ctf2026" from ctf2026.cyberorch.com) and loads the
# matching event context via the API.
#
# Reserved subdomains (handled above or by other services):
#   api.cyberorch.com, desktop.cyberorch.com
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orchi-event-wildcard-ingress
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-event-ingress
    app.kubernetes.io/part-of: orchi
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "*.cyberorch.com"
      secretName: cyberorch-tls-cert
  rules:
    # Wildcard — all event subdomains serve the frontend SPA
    - host: "*.cyberorch.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchi-frontend
                port:
                  number: 80
