# ==============================================================================
# Guacamole Access NetworkPolicy
# ==============================================================================
# Allows the Guacamole proxy (guacd) in orchi-system to reach frontend
# pods/VMs in lab namespaces for RDP connections.
#
# Replaces:
#   guacamole.CreateRDPConn() → RDP traffic from guacd to lab frontend
#   vbox.SetLocalRDP()        → RDP port access via this network policy
# ==============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-guacamole-access
  namespace: orchi-lab-example
  labels:
    app.kubernetes.io/managed-by: orchi-operator
    app.kubernetes.io/part-of: orchi
    orchi.cyberorch.com/component: network-policy
    orchi.cyberorch.com/lab-id: "example"
spec:
  podSelector:
    matchLabels:
      orchi.cyberorch.com/component: frontend
  policyTypes:
    - Ingress
  ingress:
    # Allow RDP from Guacamole guacd in orchi-system
    - from:
        - namespaceSelector:
            matchLabels:
              orchi.cyberorch.com/component: system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: guacamole
      ports:
        - port: 3389
          protocol: TCP
