# ==============================================================================
# Orchi Challenge CRD
# ==============================================================================
# CustomResourceDefinition for Challenge resources.
# Replaces legacy store.Exercise and store.ExerciseInstanceConfig models.
# The orchi-operator watches Challenge resources and reconciles them into
# Deployments, Services, ConfigMaps, and Secrets.
# ==============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: challenges.orchi.cicibogaz.com
  labels:
    app.kubernetes.io/managed-by: orchi-operator
    app.kubernetes.io/part-of: orchi
  annotations:
    orchi.cicibogaz.com/description: "Defines a challenge workload within an orchi lab"
spec:
  group: orchi.cicibogaz.com
  names:
    kind: Challenge
    listKind: ChallengeList
    plural: challenges
    singular: challenge
    shortNames:
      - chal
      - chals
    categories:
      - orchi
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Category
          type: string
          jsonPath: .spec.category
        - name: Difficulty
          type: string
          jsonPath: .spec.difficulty
        - name: Points
          type: integer
          jsonPath: .spec.points
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: "Challenge is a cybersecurity challenge workload in an orchi lab."
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - image
                - tag
              description: "Desired state of the Challenge."
              properties:
                tag:
                  type: string
                  description: "Unique tag identifier for this challenge (maps to store.Tag)."
                  pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
                  minLength: 2
                  maxLength: 63
                name:
                  type: string
                  description: "Human-readable name of the challenge."
                  maxLength: 256
                image:
                  type: string
                  description: "Container image for the challenge."
                category:
                  type: string
                  description: "Challenge category (web, crypto, forensics, etc)."
                  enum:
                    - web
                    - crypto
                    - forensics
                    - reverse-engineering
                    - pwn
                    - misc
                    - network
                    - osint
                difficulty:
                  type: string
                  description: "Difficulty level."
                  enum:
                    - easy
                    - medium
                    - hard
                    - expert
                  default: medium
                points:
                  type: integer
                  description: "Points awarded for solving."
                  minimum: 1
                  maximum: 10000
                  default: 100
                flag:
                  type: object
                  description: "Flag configuration for this challenge."
                  properties:
                    type:
                      type: string
                      description: "static = fixed flag, dynamic = generated per instance."
                      enum:
                        - static
                        - dynamic
                      default: dynamic
                    value:
                      type: string
                      description: "Static flag value (only used when type=static)."
                    envVar:
                      type: string
                      description: "Environment variable to inject dynamic flag into."
                      default: "CHALLENGE_FLAG"
                ports:
                  type: array
                  description: "Ports exposed by the challenge container."
                  items:
                    type: object
                    required:
                      - port
                    properties:
                      name:
                        type: string
                      port:
                        type: integer
                        minimum: 1
                        maximum: 65535
                      protocol:
                        type: string
                        enum: [TCP, UDP]
                        default: TCP
                envVars:
                  type: array
                  description: "Additional environment variables (maps to store.EnvVarConfig)."
                  items:
                    type: object
                    required:
                      - name
                      - value
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                resources:
                  type: object
                  description: "Resource requests and limits."
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "100m"
                        memory:
                          type: string
                          default: "128Mi"
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "500m"
                        memory:
                          type: string
                          default: "512Mi"
                dnsRecords:
                  type: array
                  description: "DNS records for this challenge (maps to store.RecordConfig)."
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [A, CNAME, TXT, MX]
                      name:
                        type: string
                      rdata:
                        type: string
                static:
                  type: boolean
                  description: "If true, challenge has no running container (flag-only)."
                  default: false
                description:
                  type: string
                  description: "Challenge description shown to participants."
                teamDescription:
                  type: string
                  description: "Organizer-facing description."
                prerequisites:
                  type: array
                  description: "Tags of challenges that must be solved first."
                  items:
                    type: string
                outcomes:
                  type: array
                  description: "Learning outcomes."
                  items:
                    type: string
            status:
              type: object
              description: "Observed state of the Challenge."
              properties:
                phase:
                  type: string
                  description: "Current lifecycle phase."
                  enum:
                    - Pending
                    - Creating
                    - Running
                    - Stopped
                    - Failed
                    - Deleted
                podName:
                  type: string
                  description: "Name of the running pod."
                serviceIP:
                  type: string
                  description: "ClusterIP of the challenge service."
                serviceName:
                  type: string
                  description: "Name of the challenge service."
                startedAt:
                  type: string
                  format: date-time
                  description: "Timestamp when the challenge started running."
                message:
                  type: string
                  description: "Human-readable status message."
                solvedBy:
                  type: array
                  description: "List of team IDs that solved this challenge."
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
