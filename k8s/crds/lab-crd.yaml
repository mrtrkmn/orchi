# ==============================================================================
# Orchi Lab CRD
# ==============================================================================
# CustomResourceDefinition for Lab resources.
# A Lab is the runtime instance of an Event — it owns a Namespace containing
# all challenge pods, services, DNS, DHCP, and frontend VMs for one team.
#
# Legacy mapping:
#   lab.Lab interface           → Lab CR lifecycle (Start/Stop/Suspend/Resume)
#   lab.Config.Exercises        → spec.exercises
#   lab.Config.Frontends        → spec.frontends
#   lab.Config.DisabledExercises→ spec.disabledExercises
#   lab.lab.tag                 → metadata.name
#   lab.lab.environment         → namespace + challenge pods
#   lab.lab.frontends           → spec.frontends (reconciled into VMs/pods)
#   exercise.Environment        → Lab namespace + NetworkPolicy
# ==============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: labs.orchi.cyberorch.com
  labels:
    app.kubernetes.io/managed-by: orchi-operator
    app.kubernetes.io/part-of: orchi
spec:
  group: orchi.cyberorch.com
  names:
    kind: Lab
    listKind: LabList
    plural: labs
    singular: lab
    shortNames:
      - lb
    categories:
      - orchi
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Event
          type: string
          jsonPath: .spec.eventRef
        - name: Team
          type: string
          jsonPath: .spec.teamRef
        - name: Namespace
          type: string
          jsonPath: .status.namespace
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: "Lab is a running lab instance assigned to a team within an event."
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - eventRef
                - teamRef
              properties:
                eventRef:
                  type: string
                  description: "Name of the Event CR that owns this lab."
                teamRef:
                  type: string
                  description: "Name of the Team CR assigned to this lab."
                exercises:
                  type: array
                  description: "Challenge tags to deploy in this lab."
                  items:
                    type: string
                disabledExercises:
                  type: array
                  description: "Challenge tags created but not auto-started."
                  items:
                    type: string
                frontends:
                  type: array
                  description: "Frontend configurations (desktop VMs accessible via Guacamole)."
                  items:
                    type: object
                    required:
                      - image
                    properties:
                      image:
                        type: string
                        description: "Frontend VM/container image."
                      memoryMB:
                        type: integer
                        description: "Memory allocation in MB."
                        minimum: 256
                        default: 2048
                      cpu:
                        type: number
                        description: "CPU allocation."
                        minimum: 0.1
                        default: 1.0
                      rdpPort:
                        type: integer
                        description: "RDP port for Guacamole connection."
                        minimum: 1
                        maximum: 65535
                vpnEnabled:
                  type: boolean
                  description: "Whether this lab requires VPN access."
                  default: false
            status:
              type: object
              description: "Observed state of the Lab."
              properties:
                phase:
                  type: string
                  description: "Current lifecycle phase."
                  enum:
                    - Pending
                    - Creating
                    - Running
                    - Suspended
                    - Stopped
                    - Failed
                    - Deleting
                namespace:
                  type: string
                  description: "Kubernetes namespace for this lab."
                networkInterface:
                  type: string
                  description: "Lab network interface name."
                labSubnet:
                  type: string
                  description: "Lab subnet CIDR."
                labDNS:
                  type: string
                  description: "Lab DNS server address."
                rdpPorts:
                  type: array
                  description: "RDP ports for frontend access."
                  items:
                    type: integer
                challengeStatuses:
                  type: array
                  description: "Per-challenge deployment status."
                  items:
                    type: object
                    properties:
                      tag:
                        type: string
                      phase:
                        type: string
                        enum:
                          - Pending
                          - Running
                          - Stopped
                          - Failed
                      podName:
                        type: string
                startedAt:
                  type: string
                  format: date-time
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
