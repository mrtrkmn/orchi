# ==============================================================================
# Orchi Team CRD
# ==============================================================================
# CustomResourceDefinition for Team resources.
# A Team represents a participant group within an Event.
#
# Legacy mapping:
#   store.Team.id               → metadata.name (or spec.id)
#   store.Team.email            → spec.email
#   store.Team.name             → spec.name
#   store.Team.hashedPassword   → spec.passwordSecretRef
#   store.Team.challenges       → status.challenges
#   store.Team.vpnConf          → status.vpnConfig
#   store.Team.labSubnet        → status.labSubnet
#   store.Team.lastAccess       → status.lastAccess
#   store.Team.isLabAssigned    → status.labAssigned
#   store.Team.disabledChallenges → spec.disabledChallenges
# ==============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: teams.orchi.cyberorch.com
  labels:
    app.kubernetes.io/managed-by: orchi-operator
    app.kubernetes.io/part-of: orchi
spec:
  group: orchi.cyberorch.com
  names:
    kind: Team
    listKind: TeamList
    plural: teams
    singular: team
    shortNames:
      - tm
    categories:
      - orchi
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: TeamName
          type: string
          jsonPath: .spec.name
        - name: Event
          type: string
          jsonPath: .spec.eventRef
        - name: Lab
          type: string
          jsonPath: .status.labRef
        - name: Solved
          type: integer
          jsonPath: .status.solvedCount
        - name: LastAccess
          type: date
          jsonPath: .status.lastAccess
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: "Team is a participant group registered to an event."
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - name
                - eventRef
              properties:
                name:
                  type: string
                  description: "Team display name."
                  maxLength: 256
                email:
                  type: string
                  description: "Team contact email."
                eventRef:
                  type: string
                  description: "Name of the Event CR this team belongs to."
                passwordSecretRef:
                  type: object
                  description: "Reference to Secret containing the team's hashed password."
                  properties:
                    name:
                      type: string
                    key:
                      type: string
                      default: "password-hash"
                disabledChallenges:
                  type: object
                  description: "Map of parent tag → disabled child challenge tags."
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              description: "Observed state of the Team."
              properties:
                labRef:
                  type: string
                  description: "Name of the Lab CR assigned to this team."
                labAssigned:
                  type: boolean
                  description: "Whether a lab has been assigned."
                  default: false
                labSubnet:
                  type: string
                  description: "Lab network subnet."
                lastAccess:
                  type: string
                  format: date-time
                  description: "Last time the team accessed their lab."
                solvedCount:
                  type: integer
                  description: "Number of challenges solved."
                  default: 0
                challenges:
                  type: array
                  description: "Challenge completion status."
                  items:
                    type: object
                    properties:
                      tag:
                        type: string
                        description: "Challenge tag."
                      completedAt:
                        type: string
                        format: date-time
                        description: "When the challenge was solved."
                vpnConfig:
                  type: object
                  description: "Team VPN connection details."
                  properties:
                    privateKeySecretRef:
                      type: object
                      description: "Secret containing client private key."
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                    publicKey:
                      type: string
                    endpoint:
                      type: string
                    allowedIPs:
                      type: string
                    labDNS:
                      type: string
                hostsInfo:
                  type: array
                  description: "Host entries for the team."
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
