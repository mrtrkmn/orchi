# ==============================================================================
# Orchi Challenge Secret
# ==============================================================================
# Stores the challenge flag and any sensitive credentials.
# Replaces: store.ChildrenChalConfig.StaticFlag / dynamically generated flags.
# In production, the orchi-operator generates unique flags per lab instance.
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: challenge-sql-injection-secret
  namespace: orchi-lab-example
  labels:
    app.kubernetes.io/name: challenge-sql-injection
    app.kubernetes.io/managed-by: orchi-operator
    app.kubernetes.io/part-of: orchi
    orchi.cyberorch.com/component: challenge
    orchi.cyberorch.com/lab-id: "example"
type: Opaque
# Values are base64-encoded. In production, generated by orchi-operator.
# echo -n "ORCHI{example_sql_injection_flag_2024}" | base64
# echo -n "admin" | base64
# echo -n "challenge-db-pass-123" | base64
stringData:
  flag: "ORCHI{example_sql_injection_flag_2024}"
  db-username: "admin"
  db-password: "challenge-db-pass-123"
