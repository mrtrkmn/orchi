# Orchi API Gateway Deployment
#
# REST API gateway that translates frontend REST calls to backend gRPC services.
# Handles JWT authentication, CORS, rate limiting, and WebSocket connections.
# Independently scalable — the primary ingress point for all API traffic.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchi-api-gateway
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-api-gateway
    app.kubernetes.io/part-of: orchi
    app.kubernetes.io/component: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: orchi-api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchi-api-gateway
        app.kubernetes.io/part-of: orchi
        app.kubernetes.io/component: api-gateway
    spec:
      serviceAccountName: orchi-api-gateway
      containers:
        - name: api-gateway
          image: ghcr.io/mrtrkmn/orchi-api:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 8081
              name: metrics
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: METRICS_ADDR
              value: ":8081"
            - name: STORE_ADDR
              value: "orchi-store.orchi-store.svc.cluster.local:5454"
            - name: DAEMON_ADDR
              value: "orchi-operator.orchi-system.svc.cluster.local:5454"
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: orchi-api-config
                  key: cors-origins
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: orchi-jwt-keys
                  key: signing-key
            - name: RATE_LIMIT_PER_MINUTE
              value: "120"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: orchi-api-gateway
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-api-gateway
    app.kubernetes.io/part-of: orchi
spec:
  selector:
    app.kubernetes.io/name: orchi-api-gateway
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
    - port: 8081
      targetPort: metrics
      protocol: TCP
      name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchi-api-config
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-api-gateway
    app.kubernetes.io/part-of: orchi
data:
  cors-origins: "https://cyberorch.com,https://app.cyberorch.com"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orchi-api-gateway
  namespace: orchi-system
  labels:
    app.kubernetes.io/name: orchi-api-gateway
    app.kubernetes.io/part-of: orchi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orchi-api-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
