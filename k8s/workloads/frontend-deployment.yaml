# Orchi Frontend Deployment
#
# Serves the React SPA as static assets via Nginx.
# Independently scalable from the backend API.
# No server-side rendering — pure static file serving.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchi-frontend
  namespace: orchi-frontend
  labels:
    app.kubernetes.io/name: orchi-frontend
    app.kubernetes.io/part-of: orchi
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orchi-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchi-frontend
        app.kubernetes.io/part-of: orchi
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/mrtrkmn/orchi-frontend:latest
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: orchi-frontend
  namespace: orchi-frontend
  labels:
    app.kubernetes.io/name: orchi-frontend
    app.kubernetes.io/part-of: orchi
spec:
  selector:
    app.kubernetes.io/name: orchi-frontend
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orchi-frontend
  namespace: orchi-frontend
  labels:
    app.kubernetes.io/name: orchi-frontend
    app.kubernetes.io/part-of: orchi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orchi-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
